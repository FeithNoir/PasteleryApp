<div class="cake-list-container">
  <div class="cake-list-grid">
    @for (cake of cakes(); track cake.id) {
    <shared-card [cake]="cake" />
    }
  </div>
</div>

@if (cake()) {
  <div class="cake-detail-container">
    <img [src]="cake()?.imageUrl" [alt]="cake()?.name">
    <div class="cake-details">
      <h2>{{ cake()?.name }}</h2>
      <p>{{ cake()?.description }}</p>
    </div>
  </div>
} @else {
  <p>Pastel no encontrado.</p>
}
