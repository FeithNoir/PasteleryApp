<div class="card-content">
  <a [routerLink]="['/cake', cake().id]">
    <img [ngSrc]="cake().imageUrl" [alt]="cake().name" width="1024" height="1024" [priority]="cake().id < 4">
    <h3>{{ cake().name }}</h3>
  </a>
  <div class="card-footer">
    <p>{{ cake().price | currency:'USD' }}</p>
    <button (click)="addToCart()">Añadir al carrito</button>
  </div>
</div>

@if (showModal()) {
<shared-modal [cake]="cake()" (close)="closeModal()" />
}
